<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC For – Quality PCs & Repairs</title>

<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #38bdf8;
        --text: #e2e8f0;
        --muted: #94a3b8;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        padding: 20px;
    }

    .card {
        background: var(--card);
        padding: 40px;
        border-radius: 16px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 15px;
    }

    p {
        color: var(--muted);
        margin-bottom: 25px;
    }

    .badge {
        display: inline-block;
        background: var(--accent);
        color: #0f172a;
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.9rem;
    }

    footer {
        margin-top: 25px;
        font-size: 0.8rem;
        color: var(--muted);
    }
</style>
</head>

<body>

<div class="card">
    <h1>PC For</h1>
    <p>Affordable custom PCs, repairs, and upgrades.</p>
    
    <div class="badge">🚧 Website Launching Soon</div>

    <footer>
        © 2026 PC For. All rights reserved.
    </footer>
</div>

</body>
</html>
